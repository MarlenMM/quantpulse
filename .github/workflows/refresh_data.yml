name: Nightly Data Refresh

on:
  schedule:
    # 02:00 UTC ~= 9-10pm US/Eastern depending on DST (Section 6.4) -- the
    # script itself checks the NYSE calendar, so an imprecise cron just
    # means an occasional no-op run, not a correctness issue.
    - cron: "0 2 * * 1-5"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Apply migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: "sqlite:///./quantpulse.db"

      - name: Run nightly refresh
        run: uv run python scripts/refresh_data.py
        env:
          DATABASE_URL: "sqlite:///./quantpulse.db"
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}

      # Deliberately no "commit the refreshed DB back" step yet: Section 4.5
      # warns that a single shared SQLite file becomes a real liability once
      # portfolio tables exist (Phase 8). That persistence/deployment wiring
      # belongs with Phase 11, after the session-vs-sqlite backend split.
